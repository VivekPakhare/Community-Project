{% extends 'base.html' %}

{% block title %}Delete Product - CampusCart{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body p-4 text-center">
                    <i class="bi bi-exclamation-triangle text-warning" style="font-size: 3rem;"></i>
                    <h3 class="mt-3">Remove Product?</h3>
                    <p>Are you sure you want to remove "<strong>{{ product.title }}</strong>"?</p>
                    <p class="text-muted">This will hide the product from the marketplace.</p>
                    <form method="POST">
                        {% csrf_token %}
                        <a href="{% url 'products:detail' pk=product.pk %}" class="btn btn-secondary me-2">Cancel</a>
                        <button type="submit" class="btn btn-danger">Remove Product</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
