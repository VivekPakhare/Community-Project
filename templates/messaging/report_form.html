{% extends 'base.html' %}

{% block title %}Report an Issue - CampusCart{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h3 class="mb-4"><i class="bi bi-flag"></i> Report an Issue</h3>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Reason</label>
                            <select name="reason" class="form-select" required>
                                <option value="">Select reason</option>
                                <option value="spam">Spam</option>
                                <option value="scam">Scam</option>
                                <option value="inappropriate">Inappropriate Content</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea name="description" class="form-control" rows="4" required placeholder="Please describe the issue in detail..."></textarea>
                        </div>
                        <input type="hidden" name="reported_user" value="{{ request.GET.user }}">
                        <input type="hidden" name="product" value="{{ request.GET.product }}">
                        <button type="submit" class="btn btn-danger w-100">Submit Report</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
