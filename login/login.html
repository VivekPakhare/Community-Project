<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <style>
    :root {
      --black: #000;
      --blue-ribbon: #0069ec;
      --dodger-blue: #25a3ff;
      --mine-shaft: #333;
      --scorpion: #565656;
      --torch-red: #ff0033;
      --white: #fff;
    }

    body {
      font-family: "Open Sans", sans-serif;
      margin: 0;
      height: 100vh;
      display: grid;
      place-items: center;
      background-color: var(--dodger-blue);
      position: relative;
      overflow: hidden;
    }

    .login-container {
      width: 180px;
      height: 65px;
      z-index: 1;
      display: flex;
      justify-content: center;
    }

    .login-toggle {
      width: inherit;
      height: inherit;
      font-size: 18px;
      color: var(--mine-shaft);
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--white);
      box-shadow: 0 5px 10px -2px rgba(0, 0, 0, 0.2),
                  0 2px 4px -1px rgba(0, 0, 0, 0.3);
    }

    .form {
      position: relative;
      width: 382px;
      padding: 30px;
      background-color: var(--white);
      box-shadow: 0 5px 10px -2px rgba(0, 0, 0, 0.2),
                  0 2px 4px -1px rgba(0, 0, 0, 0.3);
      display: none;
      flex-direction: column;
      gap: 20px;
      box-sizing: border-box;
    }

    .form.active {
      display: flex;
      animation: slideIn 0.4s ease-out;
    }

    @keyframes slideIn {
      from {
        transform: translateY(20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .form label {
      position: relative;
      display: flex;
      flex-direction: column;
      font-size: 14px;
      color: var(--scorpion);
    }

    .form input {
      font-size: 16px;
      padding: 10px;
      border: 1px solid var(--scorpion);
      border-radius: 4px;
      margin-top: 5px;
      outline: none;
    }

    .form button {
      background-color: var(--blue-ribbon);
      color: var(--white);
      border: none;
      padding: 10px;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .form button:hover {
      background-color: var(--dodger-blue);
    }

    .form .link-register {
      font-size: 14px;
      color: var(--scorpion);
      text-align: center;
      margin-top: 10px;
    }

    .form .link-register a {
      color: var(--blue-ribbon);
      text-decoration: none;
      font-weight: bold;
      transition: color 0.3s;
    }

    .form .link-register a:hover {
      color: var(--torch-red);
    }

    .welcome-msg {
      display: none;
      font-size: 28px;
      color: var(--white);
      animation: fadeIn 0.4s ease-out forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-toggle" id="loginToggle">Login</div>
  </div>

  <form class="form" id="loginForm">
    <label for="loginUser">
      Username
      <input type="text" id="loginUser" required pattern="[^\s]+" placeholder="Enter username" />
    </label>

    <label for="loginPass">
      Password
      <input type="password" id="loginPass" required placeholder="Enter password" />
    </label>

    <button type="submit">Login</button>

    <div class="link-register">
      Don't have an account? <a href="register.html">Register</a>
    </div>
  </form>

  <div class="welcome-msg" id="welcomeMsg">Welcome back!</div>

  <script>
    const toggleBtn = document.getElementById("loginToggle");
    const loginForm = document.getElementById("loginForm");
    const welcomeMsg = document.getElementById("welcomeMsg");

    toggleBtn.addEventListener("click", () => {
      loginForm.classList.add("active");
      toggleBtn.style.display = "none";
    });

    document.getElementById("loginUser").addEventListener("input", function () {
      this.value = this.value.replace(/\s/g, '');
    });

    loginForm.addEventListener("submit", function (e) {
      e.preventDefault();
      loginForm.style.display = "none";
      welcomeMsg.style.display = "block";
    });

    ["loginUser", "loginPass"].forEach((id, idx) => {
      const input = document.getElementById(id);
      input.addEventListener("keypress", (e) => {
        if (e.key === "Enter" && input.checkValidity()) {
          if (idx === 0) {
            document.getElementById("loginPass").focus();
            e.preventDefault();
          }
        }
      });
    });
  </script>
</body>
</html>
