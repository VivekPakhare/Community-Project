services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SECRET_KEY=change-me-in-production
      - DJANGO_DEBUG=True
      - ALLOWED_HOSTS=localhost,127.0.0.1
    volumes:
      - .:/app
      - media_data:/app/media
    command: python manage.py runserver 0.0.0.0:8000

volumes:
  media_data:
